<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WazeBeepOnly</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: white;
      padding: 1.2rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }
    header h1 { font-size: 1.2rem; font-weight: 700; }
    header .sub { font-size: 0.75rem; opacity: 0.55; margin-top: 0.15rem; }

    .header-btns { display: flex; gap: 0.6rem; align-items: center; flex-shrink: 0; }

    .btn-ghost {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      border-radius: 7px;
      padding: 0.45rem 0.9rem;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.1); }

    .btn-main {
      background: #05c3dd;
      color: #1a1a2e;
      border: none;
      border-radius: 7px;
      padding: 0.5rem 1.2rem;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .btn-main:hover  { background: #04b0c8; }
    .btn-main:active { transform: scale(0.97); }
    .btn-main:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .main { max-width: 680px; margin: 1.2rem auto; padding: 0 0.9rem 3rem; }

    .stats {
      background: white;
      border-radius: 10px;
      padding: 0.8rem 1rem;
      margin-bottom: 1rem;
      display: flex;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .stat { flex: 1; text-align: center; }
    .stat + .stat { border-inline-start: 1px solid #eee; }
    .stat .num { font-size: 1.6rem; font-weight: 700; line-height: 1; }
    .stat .lbl { font-size: 0.72rem; color: #999; margin-top: 0.2rem; }
    .stat.ss .num { color: #bbb; }
    .stat.s1 .num { color: #1565c0; }
    .stat.s2 .num { color: #bf360c; }

    .cat {
      background: white;
      border-radius: 10px;
      margin-bottom: 0.7rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      overflow: hidden;
    }
    .cat-head {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.8rem 1rem;
      cursor: pointer;
      user-select: none;
      transition: background 0.12s;
    }
    .cat-head:hover { background: #fafafa; }
    .cat.open .cat-head { border-bottom: 1px solid #f0f0f0; }
    .chevron { font-size: 0.6rem; color: #ccc; transition: transform 0.2s; flex-shrink: 0; }
    .cat.open .chevron { transform: rotate(180deg); }
    .cat-title { font-weight: 600; font-size: 0.9rem; flex: 1; }

    .set-all { display: flex; gap: 0.25rem; flex-shrink: 0; }
    .set-all button {
      font-size: 0.68rem;
      padding: 0.18rem 0.45rem;
      border: 1px solid #e0e0e0;
      border-radius: 5px;
      background: white;
      cursor: pointer;
      color: #666;
    }
    .set-all button:hover { background: #f5f5f5; }

    .cat-body { display: none; }
    .cat.open .cat-body { display: block; }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
      padding: 0.5rem 1rem;
      border-bottom: 1px solid #f7f7f7;
    }
    .row:last-child { border-bottom: none; }
    .ev-info { flex: 1; min-width: 0; }
    .ev-desc { font-size: 0.85rem; }
    .ev-file { font-size: 0.68rem; color: #ccc; font-family: monospace; margin-top: 1px; }

    .seg {
      display: inline-flex;
      border: 1px solid #ddd;
      border-radius: 7px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .seg input[type=radio] { display: none; }
    .seg label {
      padding: 0.28rem 0.6rem;
      font-size: 0.78rem;
      cursor: pointer;
      color: #bbb;
      border-inline-start: 1px solid #ddd;
      white-space: nowrap;
      line-height: 1.6;
      transition: background 0.1s, color 0.1s;
    }
    .seg label:first-of-type { border-inline-start: none; }
    .seg input[value=silent]:checked + label { background: #ececec; color: #555; font-weight: 600; }
    .seg input[value=beep1]:checked  + label { background: #1565c0; color: white; font-weight: 600; }
    .seg input[value=beep2]:checked  + label { background: #bf360c; color: white; font-weight: 600; }

    /* Overlay */
    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 300;
      align-items: center; justify-content: center;
    }
    .overlay.show { display: flex; }
    .dialog {
      background: white;
      border-radius: 14px;
      padding: 2rem 2.2rem;
      text-align: center;
      min-width: 240px;
      max-width: 320px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.25);
    }
    .dialog h3 { font-size: 1rem; margin-bottom: 1rem; }
    .bar-wrap { background: #eee; border-radius: 99px; height: 6px; overflow: hidden; margin-bottom: 0.5rem; }
    .bar-fill { height: 100%; background: #05c3dd; border-radius: 99px; width: 0; transition: width 0.1s; }
    .dialog-sub { font-size: 0.75rem; color: #aaa; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%; transform: translateX(-50%);
      background: #1a1a2e;
      color: white;
      padding: 0.7rem 1.3rem;
      border-radius: 10px;
      font-size: 0.85rem;
      z-index: 400;
      opacity: 0;
      transition: opacity 0.3s;
      white-space: pre-line;
      text-align: center;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>WazeBeepOnly</h1>
    <div class="sub">הגדר beep לכל event של Waze</div>
  </div>
  <div class="header-btns">
    <button class="btn-ghost" onclick="previewSounds()">▶ תקשיב</button>
    <button class="btn-main" id="dlBtn" onclick="onAction()">…</button>
  </div>
</header>

<div class="main">
  <div class="stats">
    <div class="stat ss"><div class="num" id="cS">0</div><div class="lbl">🔇 שקט</div></div>
    <div class="stat s1"><div class="num" id="c1">0</div><div class="lbl">🔔 beep</div></div>
    <div class="stat s2"><div class="num" id="c2">0</div><div class="lbl">🔔🔔 beep×2</div></div>
  </div>
  <div id="cats"></div>
</div>

<div class="overlay" id="overlay">
  <div class="dialog">
    <h3 id="dlgTitle">מייצר קבצים...</h3>
    <div class="bar-wrap"><div class="bar-fill" id="dlgBar"></div></div>
    <div class="dialog-sub" id="dlgSub"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Data ──────────────────────────────────────────────────────────
const CATS = [
  { name: "ניווט - פניות", events: [
    { f:"TurnLeft",    d:"פנה שמאלה",              def:"beep1" },
    { f:"TurnRight",   d:"פנה ימינה",              def:"beep1" },
    { f:"KeepLeft",    d:"הישאר בנתיב שמאל",       def:"beep1" },
    { f:"KeepRight",   d:"הישאר בנתיב ימין",       def:"beep1" },
    { f:"Straight",    d:"המשך ישר",                def:"beep1" },
    { f:"ExitLeft",    d:"צא משמאל (כביש מהיר)",   def:"beep1" },
    { f:"ExitRight",   d:"צא מימין (כביש מהיר)",   def:"beep1" },
    { f:"Exit",        d:"צא (כללי)",               def:"beep1" },
    { f:"uturn",       d:"פנייה פרסה",              def:"beep1" },
    { f:"Roundabout",  d:"כנס לכיכר",               def:"beep1" },
  ]},
  { name: "מספרי יציאה", events: [
    { f:"First",   d:"ראשונה",                      def:"silent" },
    { f:"Second",  d:"שנייה",                       def:"silent" },
    { f:"Third",   d:"שלישית",                      def:"silent" },
    { f:"Fourth",  d:"רביעית",                      def:"silent" },
    { f:"Fifth",   d:"חמישית",                      def:"silent" },
    { f:"Sixth",   d:"שישית",                       def:"silent" },
    { f:"Seventh", d:"שביעית",                      def:"silent" },
    { f:"AndThen", d:"ואז... (מחבר הנחיות)",         def:"silent" },
  ]},
  { name: "מרחקים (לפני פנייה)", events: [
    { f:"200",        d:"עוד 200 רגל",   def:"silent" },
    { f:"400",        d:"עוד 400 רגל",   def:"silent" },
    { f:"800",        d:"עוד 800 רגל",   def:"silent" },
    { f:"1500",       d:"עוד מייל",      def:"silent" },
    { f:"200meters",  d:"עוד 200 מטר",   def:"silent" },
    { f:"400meters",  d:"עוד 400 מטר",   def:"silent" },
    { f:"800meters",  d:"עוד 800 מטר",   def:"silent" },
    { f:"1000meters", d:"עוד קילומטר",   def:"silent" },
    { f:"1500meters", d:"עוד 1.5 ק\"מ",  def:"silent" },
    { f:"ft",         d:"המילה 'רגל'",   def:"silent" },
    { f:"m",          d:"המילה 'מטר'",   def:"silent" },
    { f:"within",     d:"המילה 'תוך'",   def:"silent" },
  ]},
  { name: "התחלה וסיום", events: [
    { f:"StartDrive1", d:"ברכת פתיחה 1", def:"silent" },
    { f:"StartDrive2", d:"ברכת פתיחה 2", def:"silent" },
    { f:"StartDrive3", d:"ברכת פתיחה 3", def:"silent" },
    { f:"StartDrive4", d:"ברכת פתיחה 4", def:"silent" },
    { f:"StartDrive5", d:"ברכת פתיחה 5", def:"silent" },
    { f:"StartDrive6", d:"ברכת פתיחה 6", def:"silent" },
    { f:"StartDrive7", d:"ברכת פתיחה 7", def:"silent" },
    { f:"StartDrive8", d:"ברכת פתיחה 8", def:"silent" },
    { f:"StartDrive9", d:"ברכת פתיחה 9", def:"silent" },
    { f:"Arrive",      d:"הגעת ליעד!",   def:"beep2" },
  ]},
  { name: "התרעות", events: [
    { f:"ApproachAccident",    d:"תאונה קדימה",    def:"beep2" },
    { f:"ApproachHazard",      d:"מפגע בדרך",       def:"beep2" },
    { f:"ApproachRedLightCam", d:"מצלמת רמזור",    def:"beep2" },
    { f:"ApproachSpeedCam",    d:"מצלמת מהירות",   def:"beep2" },
    { f:"ApproachTraffic",     d:"פקק קדימה",      def:"beep2" },
    { f:"Police",              d:"משטרה בדרך",     def:"beep2" },
  ]},
  { name: "צלילי ממשק", events: [
    { f:"click",          d:"קליק כפתור",           def:"silent" },
    { f:"click_long",     d:"לחיצה ארוכה",          def:"silent" },
    { f:"ping",           d:"התראת הודעה",           def:"beep1" },
    { f:"ping2",          d:"התראת הודעה (וריאציה)", def:"beep1" },
    { f:"TickerPoints",   d:"קיבלת נקודות",         def:"silent" },
    { f:"message_ticker", d:"הודעה בצ׳אט",          def:"silent" },
    { f:"alert_1",        d:"התרעה כללית",           def:"beep1" },
    { f:"bonus",          d:"פרס / הישג",           def:"silent" },
    { f:"reminder",       d:"תזכורת",               def:"beep1" },
    { f:"rec_start",      d:"התחלת הקלטה",          def:"silent" },
    { f:"rec_end",        d:"סיום הקלטה",           def:"silent" },
  ]},
];

// ── State ─────────────────────────────────────────────────────────
const state = {};
CATS.forEach(c => c.events.forEach(e => { state[e.f] = e.def; }));

// ── Platform detect ───────────────────────────────────────────────
const IS_ANDROID = () => typeof window.Android !== 'undefined';

// ── Render ────────────────────────────────────────────────────────
function render() {
  const btn = document.getElementById('dlBtn');
  btn.textContent = IS_ANDROID() ? 'התקן ל-Waze ↗' : 'הורד Voice Pack ↓';

  const container = document.getElementById('cats');
  container.innerHTML = '';
  CATS.forEach((cat, ci) => {
    const div = document.createElement('div');
    div.className = 'cat open';
    div.innerHTML = `
      <div class="cat-head" onclick="toggleCat(this)">
        <span class="chevron">▼</span>
        <span class="cat-title">${cat.name}</span>
        <div class="set-all" onclick="event.stopPropagation()">
          <button onclick="setAll(${ci},'silent')">🔇 הכל</button>
          <button onclick="setAll(${ci},'beep1')">🔔 הכל</button>
          <button onclick="setAll(${ci},'beep2')">🔔🔔 הכל</button>
        </div>
      </div>
      <div class="cat-body">
        ${cat.events.map(e => renderRow(e)).join('')}
      </div>`;
    container.appendChild(div);
  });
  updateStats();
}

function renderRow(e) {
  const n = `r_${e.f}`, v = state[e.f];
  return `
    <div class="row">
      <div class="ev-info">
        <div class="ev-desc">${e.d}</div>
        <div class="ev-file">${e.f}.mp3</div>
      </div>
      <div class="seg">
        <input type="radio" name="${n}" id="${n}_s" value="silent" ${v==='silent'?'checked':''} onchange="onChange('${e.f}','silent')">
        <label for="${n}_s">🔇 שקט</label>
        <input type="radio" name="${n}" id="${n}_1" value="beep1"  ${v==='beep1'?'checked':''}  onchange="onChange('${e.f}','beep1')">
        <label for="${n}_1">🔔</label>
        <input type="radio" name="${n}" id="${n}_2" value="beep2"  ${v==='beep2'?'checked':''}  onchange="onChange('${e.f}','beep2')">
        <label for="${n}_2">🔔🔔</label>
      </div>
    </div>`;
}

function toggleCat(h) { h.parentElement.classList.toggle('open'); }

function setAll(ci, val) {
  CATS[ci].events.forEach(e => { state[e.f] = val; });
  render();
}

function onChange(file, val) {
  state[file] = val;
  updateStats();
  // Update button text in case Android bridge loaded after first render
  document.getElementById('dlBtn').textContent =
    IS_ANDROID() ? 'התקן ל-Waze ↗' : 'הורד Voice Pack ↓';
}

function updateStats() {
  let s=0, b1=0, b2=0;
  Object.values(state).forEach(v => { if(v==='silent') s++; else if(v==='beep1') b1++; else b2++; });
  document.getElementById('cS').textContent = s;
  document.getElementById('c1').textContent = b1;
  document.getElementById('c2').textContent = b2;
}

// ── Audio (WAV) ───────────────────────────────────────────────────
const SR = 8000;

function makeWAV(samples) {
  const buf = new ArrayBuffer(44 + samples.length * 2);
  const v = new DataView(buf);
  const str = (o, s) => [...s].forEach((c,i) => v.setUint8(o+i, c.charCodeAt(0)));
  str(0,'RIFF'); v.setUint32(4, 36+samples.length*2, true);
  str(8,'WAVE'); str(12,'fmt '); v.setUint32(16,16,true);
  v.setUint16(20,1,true); v.setUint16(22,1,true);
  v.setUint32(24,SR,true); v.setUint32(28,SR*2,true);
  v.setUint16(32,2,true); v.setUint16(34,16,true);
  str(36,'data'); v.setUint32(40,samples.length*2,true);
  for (let i=0; i<samples.length; i++) v.setInt16(44+i*2, samples[i], true);
  return new Uint8Array(buf);
}

function silence()  { return makeWAV(new Int16Array(Math.floor(SR*0.05))); }

function beep(n) {
  const bN=Math.floor(SR*0.14), gN=Math.floor(SR*0.11), fade=Math.floor(SR*0.012);
  const total = bN*n + gN*(n-1), s = new Int16Array(total);
  for (let b=0; b<n; b++) {
    const off = b*(bN+gN);
    for (let i=0; i<bN; i++) {
      const t=i/SR, env=Math.min(i/fade,1)*Math.min((bN-i)/fade,1);
      s[off+i] = Math.round(env*13000*Math.sin(2*Math.PI*880*t));
    }
  }
  return makeWAV(s);
}

const AUDIO = { silent: null, beep1: null, beep2: null };
function initAudio() {
  if (!AUDIO.silent) {
    AUDIO.silent = silence();
    AUDIO.beep1  = beep(1);
    AUDIO.beep2  = beep(2);
  }
}

// ── Preview ───────────────────────────────────────────────────────
let actx = null;
function playWAV(bytes) {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  actx.decodeAudioData(bytes.buffer.slice(0), buf => {
    const src = actx.createBufferSource();
    src.buffer = buf; src.connect(actx.destination); src.start();
  });
}
function previewSounds() {
  initAudio();
  playWAV(AUDIO.beep1);
  setTimeout(() => playWAV(AUDIO.beep2), 700);
}

// ── Action dispatcher ─────────────────────────────────────────────
function onAction() {
  if (IS_ANDROID()) {
    document.getElementById('dlBtn').disabled = true;
    showOverlay('מתקין...', 0, 'בוחר תיקייה...');
    window.Android.installVoicePack(JSON.stringify(state));
  } else {
    generateZip();
  }
}

// ── Android callbacks ─────────────────────────────────────────────
function onInstallSuccess() {
  hideOverlay();
  document.getElementById('dlBtn').disabled = false;
  showToast('✅ הותקן בהצלחה!\nWaze ← הגדרות ← קול ← בחר beep_only');
}
function onInstallError(msg) {
  hideOverlay();
  document.getElementById('dlBtn').disabled = false;
  showToast('❌ שגיאה: ' + msg);
}
function onInstallCancel() {
  hideOverlay();
  document.getElementById('dlBtn').disabled = false;
}

// ── ZIP generation (web only) ─────────────────────────────────────
async function generateZip() {
  if (typeof JSZip === 'undefined') {
    showToast('טוען ספריה...');
    await loadScript('https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js');
  }
  const btn = document.getElementById('dlBtn');
  btn.disabled = true;
  showOverlay('מייצר קבצים...', 0, '');
  await tick();
  initAudio();

  const zip = new JSZip();
  const folder = zip.folder('beep_only');
  folder.file('INSTALL.txt',
`WazeBeepOnly Voice Pack\n========================\nהתקנה:\n1. העתק את "beep_only" אל /storage/emulated/0/waze/sound/\n2. Waze ← הגדרות ← קול ← בחר beep_only\n`);

  const all = CATS.flatMap(c => c.events);
  for (let i=0; i<all.length; i++) {
    folder.file(`${all[i].f}.mp3`, AUDIO[state[all[i].f]]);
    showOverlay('מייצר קבצים...', (i+1)/all.length*90, `${i+1} / ${all.length}`);
    await tick();
  }
  showOverlay('אורז ZIP...', 95, '');
  const blob = await zip.generateAsync({ type:'blob', compression:'DEFLATE' });
  showOverlay('מוריד...', 100, '');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'beep_only_voice_pack.zip';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  hideOverlay();
  btn.disabled = false;
}

// ── UI helpers ────────────────────────────────────────────────────
function showOverlay(title, pct, sub) {
  document.getElementById('dlgTitle').textContent = title;
  document.getElementById('dlgBar').style.width   = pct + '%';
  document.getElementById('dlgSub').textContent   = sub;
  document.getElementById('overlay').classList.add('show');
}
function hideOverlay() { document.getElementById('overlay').classList.remove('show'); }

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 4000);
}

function loadScript(src) {
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = src; s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}

function tick() { return new Promise(r => setTimeout(r, 0)); }

// ── Init ──────────────────────────────────────────────────────────
render();
// Re-check Android bridge after a tick (it loads async in WebView)
setTimeout(() => {
  if (IS_ANDROID()) {
    document.getElementById('dlBtn').textContent = 'התקן ל-Waze ↗';
  }
}, 100);
</script>
</body>
</html>
