<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WazeBeepOnly</title>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
      padding-bottom: 5rem;
    }

    header {
      background: #1a1a2e;
      color: white;
      padding: 1.1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }
    header h1 { font-size: 1.2rem; font-weight: 700; }
    header .sub { font-size: 0.75rem; opacity: 0.55; margin-top: 0.15rem; }

    .header-end { display: flex; gap: 0.5rem; align-items: center; flex-shrink: 0; }

    .btn-ghost {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      border-radius: 7px;
      padding: 0.4rem 0.85rem;
      font-size: 0.82rem;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.1); }

    .lang-toggle {
      display: flex;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 7px;
      overflow: hidden;
    }
    .lang-toggle button {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.5);
      padding: 0.4rem 0.7rem;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }
    .lang-toggle button.active {
      background: rgba(255,255,255,0.18);
      color: white;
      font-weight: 700;
    }
    .lang-toggle button:first-child { border-inline-end: 1px solid rgba(255,255,255,0.2); }

    .main { max-width: 700px; margin: 1.3rem auto; padding: 0 0.9rem; }

    .stats {
      background: white;
      border-radius: 10px;
      padding: 0.8rem 1rem;
      margin-bottom: 1rem;
      display: flex;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .stat { flex: 1; text-align: center; }
    .stat + .stat { border-inline-start: 1px solid #eee; }
    .stat .num { font-size: 1.6rem; font-weight: 700; line-height: 1; }
    .stat .lbl { font-size: 0.72rem; color: #999; margin-top: 0.2rem; }
    .stat.ss .num { color: #bbb; }
    .stat.s1 .num { color: #1565c0; }
    .stat.s2 .num { color: #bf360c; }

    .cat {
      background: white;
      border-radius: 10px;
      margin-bottom: 0.7rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      overflow: hidden;
    }
    .cat-head {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.8rem 1rem;
      cursor: pointer;
      user-select: none;
      transition: background 0.12s;
    }
    .cat-head:hover { background: #fafafa; }
    .cat.open .cat-head { border-bottom: 1px solid #f0f0f0; }
    .chevron { font-size: 0.6rem; color: #ccc; transition: transform 0.2s; flex-shrink: 0; }
    .cat.open .chevron { transform: rotate(180deg); }
    .cat-title { font-weight: 600; font-size: 0.9rem; flex: 1; }

    .set-all { display: flex; gap: 0.25rem; flex-shrink: 0; }
    .set-all button {
      font-size: 0.68rem;
      padding: 0.18rem 0.45rem;
      border: 1px solid #e0e0e0;
      border-radius: 5px;
      background: white;
      cursor: pointer;
      color: #666;
    }
    .set-all button:hover { background: #f5f5f5; }

    .cat-body { display: none; }
    .cat.open .cat-body { display: block; }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
      padding: 0.5rem 1rem;
      border-bottom: 1px solid #f7f7f7;
    }
    .row:last-child { border-bottom: none; }
    .ev-info { flex: 1; min-width: 0; }
    .ev-desc { font-size: 0.85rem; }
    .ev-file { font-size: 0.68rem; color: #ccc; font-family: monospace; margin-top: 1px; }

    .seg {
      display: inline-flex;
      border: 1px solid #ddd;
      border-radius: 7px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .seg input[type=radio] { display: none; }
    .seg label {
      padding: 0.28rem 0.6rem;
      font-size: 0.78rem;
      cursor: pointer;
      color: #bbb;
      border-inline-start: 1px solid #ddd;
      white-space: nowrap;
      line-height: 1.6;
      transition: background 0.1s, color 0.1s;
    }
    .seg label:first-of-type { border-inline-start: none; }
    .seg input[value=silent]:checked + label { background: #ececec; color: #555; font-weight: 600; }
    .seg input[value=beep1]:checked  + label { background: #1565c0; color: white; font-weight: 600; }
    .seg input[value=beep2]:checked  + label { background: #bf360c; color: white; font-weight: 600; }

    /* Sticky bottom bar */
    .bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: white;
      border-top: 1px solid #e8e8e8;
      padding: 0.7rem 1.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.07);
      z-index: 100;
    }
    .btn-main {
      background: #05c3dd;
      color: #1a1a2e;
      border: none;
      border-radius: 8px;
      padding: 0.6rem 1.4rem;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-main:hover  { background: #04b0c8; }
    .btn-main:active { transform: scale(0.97); }
    .btn-main:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    .btn-secondary {
      background: white;
      color: #1a1a2e;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 0.6rem 1.2rem;
      font-size: 0.88rem;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-secondary:hover { background: #f5f5f5; }
    .btn-upload-group { display: flex; align-items: center; gap: 0.3rem; }
    .btn-icon {
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 0.6rem 0.65rem;
      font-size: 0.85rem;
      cursor: pointer;
      color: #888;
      transition: background 0.15s;
      line-height: 1;
    }
    .btn-icon:hover { background: #f5f5f5; }

    /* Modal overlays */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 400;
      align-items: center; justify-content: center;
      padding: 1rem;
    }
    .modal-overlay.show { display: flex; }
    .modal-dialog {
      background: white;
      border-radius: 14px;
      padding: 1.8rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.25);
    }
    .modal-dialog h3 { font-size: 1rem; margin-bottom: 1.2rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 0.8rem; color: #666; margin-bottom: 0.3rem; font-weight: 600; }
    .input-field {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 0.55rem 0.8rem;
      font-size: 0.88rem;
      font-family: monospace;
      outline: none;
      transition: border-color 0.15s;
    }
    .input-field:focus { border-color: #05c3dd; }
    .form-hint { font-size: 0.72rem; color: #aaa; margin-top: 0.3rem; }
    .dialog-btns { display: flex; gap: 0.6rem; justify-content: flex-end; margin-top: 1.3rem; }
    .waze-link {
      display: block;
      font-size: 0.72rem;
      color: #aaa;
      word-break: break-all;
      text-align: center;
      text-decoration: none;
      margin-top: 0.5rem;
    }
    .waze-link:hover { color: #05c3dd; }
    #qrCode { display: flex; justify-content: center; margin: 0.5rem 0 0.3rem; }
    #qrCode img, #qrCode canvas { border-radius: 8px; }

    /* Overlay */
    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 300;
      align-items: center; justify-content: center;
    }
    .overlay.show { display: flex; }
    .dialog {
      background: white;
      border-radius: 14px;
      padding: 2rem 2.2rem;
      text-align: center;
      min-width: 240px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.25);
    }
    .dialog h3 { font-size: 1rem; margin-bottom: 1rem; }
    .bar-wrap { background: #eee; border-radius: 99px; height: 6px; overflow: hidden; margin-bottom: 0.5rem; }
    .bar-fill { height: 100%; background: #05c3dd; border-radius: 99px; width: 0; transition: width 0.1s; }
    .dialog-sub { font-size: 0.75rem; color: #aaa; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>WazeBeepOnly</h1>
    <div class="sub" id="hdrSub"></div>
  </div>
  <div class="header-end">
    <button class="btn-ghost" onclick="previewSounds()" id="btnListen"></button>
    <div class="lang-toggle">
      <button id="btnHe" onclick="setLang('he')" class="active">עב</button>
      <button id="btnEn" onclick="setLang('en')">EN</button>
    </div>
  </div>
</header>

<div class="main">
  <div class="stats">
    <div class="stat ss"><div class="num" id="cS">0</div><div class="lbl" id="lblSilent"></div></div>
    <div class="stat s1"><div class="num" id="c1">0</div><div class="lbl">🔔 beep</div></div>
    <div class="stat s2"><div class="num" id="c2">0</div><div class="lbl">🔔🔔 beep×2</div></div>
  </div>
  <div id="cats"></div>
</div>

<div class="bottom-bar">
  <div class="btn-upload-group">
    <button class="btn-main" id="btnUpload" onclick="uploadToWaze()"></button>
    <button class="btn-icon" id="btnSettings" onclick="showSettingsDialog()" title="Settings">⚙</button>
  </div>
</div>

<!-- Progress overlay -->
<div class="overlay" id="overlay">
  <div class="dialog">
    <h3 id="dlgTitle"></h3>
    <div class="bar-wrap"><div class="bar-fill" id="dlgBar"></div></div>
    <div class="dialog-sub" id="dlgSub"></div>
  </div>
</div>

<!-- Settings dialog -->
<div class="modal-overlay" id="settingsDlg">
  <div class="modal-dialog">
    <h3 id="settingsTitle"></h3>
    <div class="form-group">
      <label id="lblPackName"></label>
      <input type="text" id="inputPackName" class="input-field" placeholder="BeepOnly">
      <div class="form-hint" id="packNameHint"></div>
    </div>
    <div class="dialog-btns">
      <button class="btn-secondary" onclick="closeSettingsDialog()" id="btnTokenCancel"></button>
      <button class="btn-main" onclick="savePackName()" id="btnTokenSave"></button>
    </div>
  </div>
</div>

<!-- Result dialog -->
<div class="modal-overlay" id="resultDlg">
  <div class="modal-dialog" style="text-align:center">
    <h3 id="resultTitle"></h3>
    <p id="resultHint" style="font-size:0.8rem;color:#aaa;margin-bottom:0.5rem"></p>
    <div id="qrCode"></div>
    <a id="wazeLink" href="#" class="waze-link" target="_blank"></a>
    <div class="dialog-btns" style="margin-top:1rem; justify-content:center">
      <button class="btn-secondary" onclick="closeResult()" id="btnResultClose"></button>
      <button class="btn-main" id="btnOpenWaze" onclick="window.open(document.getElementById('wazeLink').href,'_blank')"></button>
    </div>
  </div>
</div>

<script>
// ── i18n ──────────────────────────────────────────────────────────
const T = {
  he: {
    sub:          "הגדר beep לכל event של Waze",
    listen:       "▶ תקשיב לצלילים",
    silent:       "🔇 שקט",
    allSilent:    "🔇 הכל",
    allBeep1:     "🔔 הכל",
    allBeep2:     "🔔🔔 הכל",
    segSilent:    "🔇 שקט",
    btnConfig:    "הורד config.json",
    btnUpload:    "התקן ב-Waze שלי",
    generating:   "מייצר קבצים...",
    zipping:      "אורז ZIP...",
    files:        "קבצים",
    settingsTitle:"הגדרות",
    lblPackName:  "שם חבילת הקול",
    packNameHint: "ברירת מחדל: BeepOnly",
    btnTokenSave: "שמור",
    btnCancel:    "ביטול",
    uploading:    "מייצר קבצי אודיו...",
    triggering:   "יוצר tar.gz...",
    waiting:      "מעלה ל-Waze...",
    fetchingLink: "מסיים...",
    resultTitle:  "!מוכן 🎉",
    resultHint:   "סרוק עם הטלפון:",
    btnOpenWaze:  "פתח ב-Waze 📱",
    btnClose:     "סגור",
    cats: [
      "ניווט - פניות",
      "מספרי יציאה (כיכר וכד׳)",
      "מרחקים (לפני פנייה)",
      "התחלה וסיום נסיעה",
      "התרעות",
      "צלילי ממשק",
    ],
    evs: [
      ["פנה שמאלה","פנה ימינה","הישאר בנתיב שמאל","הישאר בנתיב ימין","המשך ישר","צא משמאל (כביש מהיר)","צא מימין (כביש מהיר)","צא (כללי)","פנייה פרסה","כנס לכיכר"],
      ["ראשונה","שנייה","שלישית","רביעית","חמישית","שישית","שביעית","ואז... (מחבר שתי הנחיות)"],
      ["עוד 200 רגל","עוד 400 רגל","עוד 800 רגל","עוד מייל","עוד 200 מטר","עוד 400 מטר","עוד 800 מטר","עוד קילומטר","עוד 1.5 ק\"מ","המילה 'רגל'","המילה 'מטר'","המילה 'תוך'"],
      ["ברכת פתיחה 1","ברכת פתיחה 2","ברכת פתיחה 3","ברכת פתיחה 4","ברכת פתיחה 5","ברכת פתיחה 6","ברכת פתיחה 7","ברכת פתיחה 8","ברכת פתיחה 9","הגעת ליעד!"],
      ["תאונה קדימה","מפגע בדרך","מצלמת רמזור","מצלמת מהירות","פקק קדימה","משטרה בדרך"],
      ["קליק כפתור","לחיצה ארוכה","התראת הודעה","התראת הודעה (וריאציה)","קיבלת נקודות","הודעה בצ׳אט","התרעה כללית","פרס / הישג","תזכורת","התחלת הקלטה","סיום הקלטה"],
    ],
  },
  en: {
    sub:          "Configure beep for each Waze event",
    listen:       "▶ Listen to sounds",
    silent:       "🔇 Silent",
    allSilent:    "🔇 All",
    allBeep1:     "🔔 All",
    allBeep2:     "🔔🔔 All",
    segSilent:    "🔇 Silent",
    btnConfig:    "Download config.json",
    btnZip:       "Download ZIP ↓",
    btnUpload:    "Install in My Waze",
    generating:   "Generating files...",
    zipping:      "Zipping...",
    files:        "files",
    settingsTitle:"Settings",
    lblPackName:  "Voice Pack Name",
    packNameHint: "Default: BeepOnly",
    btnTokenSave: "Save",
    btnCancel:    "Cancel",
    uploading:    "Generating audio...",
    triggering:   "Creating tar.gz...",
    waiting:      "Uploading to Waze...",
    fetchingLink: "Finishing...",
    resultTitle:  "Done! 🎉",
    resultHint:   "Scan with your phone:",
    btnOpenWaze:  "Open in Waze 📱",
    btnClose:     "Close",
    cats: [
      "Navigation - Turns",
      "Exit Numbers (roundabout, etc.)",
      "Distances (before turn)",
      "Trip Start & End",
      "Alerts",
      "UI Sounds",
    ],
    evs: [
      ["Turn left","Turn right","Keep left","Keep right","Go straight","Exit left (highway)","Exit right (highway)","Exit (general)","U-turn","Enter roundabout"],
      ["First","Second","Third","Fourth","Fifth","Sixth","Seventh","And then... (connects instructions)"],
      ["In 200 feet","In 400 feet","In 800 feet","In 1 mile","In 200 meters","In 400 meters","In 800 meters","In 1 kilometer","In 1.5 km","The word 'feet'","The word 'meters'","The word 'within'"],
      ["Opening greeting 1","Opening greeting 2","Opening greeting 3","Opening greeting 4","Opening greeting 5","Opening greeting 6","Opening greeting 7","Opening greeting 8","Opening greeting 9","You have arrived!"],
      ["Accident ahead","Hazard on road","Red light camera","Speed camera","Traffic ahead","Police on road"],
      ["Button click","Long press","Message notification","Message notification (variant)","Points earned","Chat message","General alert","Prize / achievement","Reminder","Recording start","Recording end"],
    ],
  },
};

let lang = 'he';

function setLang(l) {
  lang = l;
  document.documentElement.lang = l;
  document.documentElement.dir  = l === 'he' ? 'rtl' : 'ltr';
  document.getElementById('btnHe').classList.toggle('active', l === 'he');
  document.getElementById('btnEn').classList.toggle('active', l === 'en');
  applyStrings();
  render();
}

function t(key) { return T[lang][key]; }

function applyStrings() {
  document.getElementById('hdrSub').textContent        = t('sub');
  document.getElementById('btnListen').textContent     = t('listen');
  document.getElementById('lblSilent').textContent     = t('silent');
  document.getElementById('btnUpload').textContent     = t('btnUpload');
  document.getElementById('settingsTitle').textContent  = t('settingsTitle');
  document.getElementById('lblPackName').textContent    = t('lblPackName');
  document.getElementById('packNameHint').textContent   = t('packNameHint');
  document.getElementById('btnTokenSave').textContent   = t('btnTokenSave');
  document.getElementById('btnTokenCancel').textContent = t('btnCancel');
  document.getElementById('resultTitle').textContent   = t('resultTitle');
  document.getElementById('resultHint').textContent    = t('resultHint');
  document.getElementById('btnOpenWaze').textContent   = t('btnOpenWaze');
  document.getElementById('btnResultClose').textContent= t('btnClose');
}

// ── Data ──────────────────────────────────────────────────────────
const FILES = [
  ["TurnLeft","TurnRight","KeepLeft","KeepRight","Straight","ExitLeft","ExitRight","Exit","uturn","Roundabout"],
  ["First","Second","Third","Fourth","Fifth","Sixth","Seventh","AndThen"],
  ["200","400","800","1500","200meters","400meters","800meters","1000meters","1500meters","ft","m","within"],
  ["StartDrive1","StartDrive2","StartDrive3","StartDrive4","StartDrive5","StartDrive6","StartDrive7","StartDrive8","StartDrive9","Arrive"],
  ["ApproachAccident","ApproachHazard","ApproachRedLightCam","ApproachSpeedCam","ApproachTraffic","Police"],
  ["click","click_long","ping","ping2","TickerPoints","message_ticker","alert_1","bonus","reminder","rec_start","rec_end"],
];
const DEFAULTS = [
  ["beep1","beep1","beep1","beep1","beep1","beep1","beep1","beep1","beep1","beep1"],
  ["silent","silent","silent","silent","silent","silent","silent","silent"],
  ["silent","silent","silent","silent","silent","silent","silent","silent","silent","silent","silent","silent"],
  ["silent","silent","silent","silent","silent","silent","silent","silent","silent","beep2"],
  ["beep2","beep2","beep2","beep2","beep2","beep2"],
  ["silent","silent","beep1","beep1","silent","silent","beep1","silent","beep1","silent","silent"],
];

// ── State ─────────────────────────────────────────────────────────
const state = {};
FILES.forEach((cat, ci) => cat.forEach((f, fi) => { state[f] = DEFAULTS[ci][fi]; }));

// ── Render ────────────────────────────────────────────────────────
function render() {
  const container = document.getElementById('cats');
  container.innerHTML = '';
  FILES.forEach((files, ci) => {
    const div = document.createElement('div');
    div.className = 'cat open';
    div.innerHTML = `
      <div class="cat-head" onclick="toggleCat(this)">
        <span class="chevron">▼</span>
        <span class="cat-title">${T[lang].cats[ci]}</span>
        <div class="set-all" onclick="event.stopPropagation()">
          <button onclick="setAll(${ci},'silent')">${t('allSilent')}</button>
          <button onclick="setAll(${ci},'beep1')">${t('allBeep1')}</button>
          <button onclick="setAll(${ci},'beep2')">${t('allBeep2')}</button>
        </div>
      </div>
      <div class="cat-body">
        ${files.map((f, fi) => renderRow(f, T[lang].evs[ci][fi])).join('')}
      </div>`;
    container.appendChild(div);
  });
  updateStats();
}

function renderRow(f, desc) {
  const n = `r_${f}`, v = state[f];
  return `
    <div class="row">
      <div class="ev-info">
        <div class="ev-desc">${desc}</div>
        <div class="ev-file">${f}.mp3</div>
      </div>
      <div class="seg">
        <input type="radio" name="${n}" id="${n}_s" value="silent" ${v==='silent'?'checked':''} onchange="onChange('${f}','silent')">
        <label for="${n}_s">${t('segSilent')}</label>
        <input type="radio" name="${n}" id="${n}_1" value="beep1"  ${v==='beep1'?'checked':''}  onchange="onChange('${f}','beep1')">
        <label for="${n}_1">🔔</label>
        <input type="radio" name="${n}" id="${n}_2" value="beep2"  ${v==='beep2'?'checked':''}  onchange="onChange('${f}','beep2')">
        <label for="${n}_2">🔔🔔</label>
      </div>
    </div>`;
}

function toggleCat(h) { h.parentElement.classList.toggle('open'); }

function setAll(ci, val) {
  FILES[ci].forEach(f => { state[f] = val; });
  render();
}

function onChange(f, val) {
  state[f] = val;
  updateStats();
}

function updateStats() {
  let s=0, b1=0, b2=0;
  Object.values(state).forEach(v => { if(v==='silent') s++; else if(v==='beep1') b1++; else b2++; });
  document.getElementById('cS').textContent = s;
  document.getElementById('c1').textContent = b1;
  document.getElementById('c2').textContent = b2;
}

// ── Audio (WAV) ───────────────────────────────────────────────────
const SR = 8000;

function makeWAV(samples) {
  const buf = new ArrayBuffer(44 + samples.length * 2);
  const v = new DataView(buf);
  const str = (o, s) => [...s].forEach((c,i) => v.setUint8(o+i, c.charCodeAt(0)));
  str(0,'RIFF'); v.setUint32(4, 36+samples.length*2, true);
  str(8,'WAVE'); str(12,'fmt '); v.setUint32(16,16,true);
  v.setUint16(20,1,true); v.setUint16(22,1,true);
  v.setUint32(24,SR,true); v.setUint32(28,SR*2,true);
  v.setUint16(32,2,true); v.setUint16(34,16,true);
  str(36,'data'); v.setUint32(40,samples.length*2,true);
  for (let i=0; i<samples.length; i++) v.setInt16(44+i*2, samples[i], true);
  return new Uint8Array(buf);
}

function silence()  { return makeWAV(new Int16Array(Math.floor(SR*0.05))); }

function beep(n) {
  const bN=Math.floor(SR*0.14), gN=Math.floor(SR*0.11), fade=Math.floor(SR*0.012);
  const s = new Int16Array(bN*n + gN*(n-1));
  for (let b=0; b<n; b++) {
    const off = b*(bN+gN);
    for (let i=0; i<bN; i++) {
      const env = Math.min(i/fade,1)*Math.min((bN-i)/fade,1);
      s[off+i] = Math.round(env*13000*Math.sin(2*Math.PI*880*i/SR));
    }
  }
  return makeWAV(s);
}

const AUDIO = { silent:null, beep1:null, beep2:null };
function initAudio() {
  if (!AUDIO.silent) { AUDIO.silent=silence(); AUDIO.beep1=beep(1); AUDIO.beep2=beep(2); }
}

// ── Preview ───────────────────────────────────────────────────────
let actx = null;
function playWAV(bytes) {
  if (!actx) actx = new (window.AudioContext||window.webkitAudioContext)();
  actx.decodeAudioData(bytes.buffer.slice(0), buf => {
    const src = actx.createBufferSource();
    src.buffer = buf; src.connect(actx.destination); src.start();
  });
}
function previewSounds() {
  initAudio();
  playWAV(AUDIO.beep1);
  setTimeout(() => playWAV(AUDIO.beep2), 700);
}

// ── Download config ───────────────────────────────────────────────
function downloadConfig() {
  const config = { pack_name: "BeepOnly", events: { ...state } };
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([JSON.stringify(config, null, 2)], {type:'application/json'}));
  a.download = 'beep_config.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ── Generate ZIP ──────────────────────────────────────────────────
async function generateZip() {
  if (typeof JSZip === 'undefined') {
    await loadScript('https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js');
  }
  const btn = document.getElementById('btnZip');
  btn.disabled = true;
  showOverlay(t('generating'), 0, '');
  await tick();
  initAudio();

  const zip = new JSZip();
  const folder = zip.folder('beep_only');
  const allFiles = FILES.flat();

  for (let i=0; i<allFiles.length; i++) {
    folder.file(`${allFiles[i]}.mp3`, AUDIO[state[allFiles[i]]]);
    showOverlay(t('generating'), (i+1)/allFiles.length*90, `${i+1} / ${allFiles.length} ${t('files')}`);
    await tick();
  }
  showOverlay(t('zipping'), 95, '');
  const blob = await zip.generateAsync({type:'blob', compression:'DEFLATE'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'beep_only_voice_pack.zip';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  hideOverlay();
  btn.disabled = false;
}

function showOverlay(title, pct, sub) {
  document.getElementById('dlgTitle').textContent = title;
  document.getElementById('dlgBar').style.width   = pct + '%';
  document.getElementById('dlgSub').textContent   = sub;
  document.getElementById('overlay').classList.add('show');
}
function hideOverlay() { document.getElementById('overlay').classList.remove('show'); }

function loadScript(src) {
  return new Promise((res,rej) => { const s=document.createElement('script'); s.src=src; s.onload=res; s.onerror=rej; document.head.appendChild(s); });
}
function tick() { return new Promise(r => setTimeout(r, 0)); }

// ── Worker Upload ─────────────────────────────────────────────────
const WORKER_URL    = 'https://wazebeeponly.REPLACE_WITH_YOUR_ACCOUNT.workers.dev/upload';
const WORKER_SECRET = 'REPLACE_WITH_YOUR_SECRET';

// ── Tar.gz creation (no dependencies — native browser APIs) ───────

function createTar(files) {
  const blocks = [];
  const enc = new TextEncoder();
  for (const {name, data} of files) {
    const h = new Uint8Array(512);
    const ws = (off, s, max) => { const b = enc.encode(s.slice(0, max)); h.set(b, off); };
    ws(0, name, 100);
    ws(100, '0000644\0', 8);
    ws(108, '0000000\0', 8);
    ws(116, '0000000\0', 8);
    ws(124, data.length.toString(8).padStart(11, '0') + '\0', 12);
    ws(136, Math.floor(Date.now()/1000).toString(8).padStart(11,'0') + '\0', 12);
    h[156] = 0x30;
    ws(257, 'ustar  \0', 8);
    h.fill(0x20, 148, 156);
    let csum = 0; h.forEach(b => csum += b);
    ws(148, csum.toString(8).padStart(6,'0') + '\0 ', 8);
    blocks.push(h, data);
    const pad = (512 - data.length % 512) % 512;
    if (pad) blocks.push(new Uint8Array(pad));
  }
  blocks.push(new Uint8Array(1024));
  const total = blocks.reduce((s,b) => s+b.length, 0);
  const out = new Uint8Array(total); let off = 0;
  for (const b of blocks) { out.set(b, off); off += b.length; }
  return out;
}

async function gzipBytes(data) {
  const cs = new CompressionStream('gzip');
  const w = cs.writable.getWriter();
  w.write(data); w.close();
  const chunks = [];
  const r = cs.readable.getReader();
  for (;;) { const {done,value} = await r.read(); if (done) break; chunks.push(value); }
  const total = chunks.reduce((s,c) => s+c.length, 0);
  const out = new Uint8Array(total); let off = 0;
  for (const c of chunks) { out.set(c, off); off += c.length; }
  return out;
}

// ── Settings (pack name) ───────────────────────────────────────────

function showSettingsDialog() {
  document.getElementById('inputPackName').value = localStorage.getItem('pack_name') || '';
  document.getElementById('settingsDlg').classList.add('show');
}

function closeSettingsDialog() {
  document.getElementById('settingsDlg').classList.remove('show');
}

function savePackName() {
  const name = document.getElementById('inputPackName').value.trim();
  if (name) localStorage.setItem('pack_name', name);
  else localStorage.removeItem('pack_name');
  closeSettingsDialog();
}

// ── Upload to Waze via Worker ──────────────────────────────────────

async function uploadToWaze() {
  const btn = document.getElementById('btnUpload');
  btn.disabled = true;
  try {
    showOverlay(t('uploading'), 10, '');
    initAudio();
    await tick();

    const allFiles = FILES.flat();
    const tarFiles = [];
    for (let i = 0; i < allFiles.length; i++) {
      const name = allFiles[i];
      tarFiles.push({ name: name + '.mp3', data: AUDIO[state[name]] });
      showOverlay(t('uploading'), 10 + (i+1)/allFiles.length*40, `${i+1} / ${allFiles.length} ${t('files')}`);
      await tick();
    }

    showOverlay(t('triggering'), 55, '');
    const tar    = createTar(tarFiles);
    const tarGz  = await gzipBytes(tar);

    showOverlay(t('waiting'), 68, '');
    const packName = localStorage.getItem('pack_name') || 'BeepOnly';
    let b64 = '';
    tarGz.forEach(b => b64 += String.fromCharCode(b));

    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Secret': WORKER_SECRET },
      body: JSON.stringify({ pack_name: packName, tar: btoa(b64) })
    });
    showOverlay(t('fetchingLink'), 90, '');
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Upload failed: ' + res.status);

    hideOverlay();
    showResult(data.link);
  } catch (e) {
    hideOverlay();
    alert((lang === 'he' ? 'שגיאה: ' : 'Error: ') + e.message);
  } finally {
    btn.disabled = false;
  }
}

function showResult(link) {
  document.getElementById('wazeLink').href        = link;
  document.getElementById('wazeLink').textContent = link;
  const qrDiv = document.getElementById('qrCode');
  qrDiv.innerHTML = '';
  const render = () => new QRCode(qrDiv, { text: link, width: 180, height: 180, correctLevel: QRCode.CorrectLevel.M });
  if (typeof QRCode !== 'undefined') {
    render();
  } else {
    loadScript('https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js').then(render);
  }
  document.getElementById('resultDlg').classList.add('show');
}

function closeResult() {
  document.getElementById('resultDlg').classList.remove('show');
}
