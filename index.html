<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WazeBeepOnly Configurator</title>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: white;
      padding: 1.2rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }

    header h1 { font-size: 1.3rem; font-weight: 700; }
    header .sub { font-size: 0.8rem; opacity: 0.6; margin-top: 0.15rem; }

    .header-actions { display: flex; gap: 0.7rem; align-items: center; }

    .btn-preview {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.35);
      color: white;
      border-radius: 7px;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-preview:hover { background: rgba(255,255,255,0.1); }

    .btn-download {
      background: #05c3dd;
      color: #1a1a2e;
      border: none;
      border-radius: 7px;
      padding: 0.55rem 1.3rem;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .btn-download:hover { background: #04afc7; }
    .btn-download:active { transform: scale(0.97); }
    .btn-download:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .main {
      max-width: 700px;
      margin: 1.5rem auto;
      padding: 0 1rem 3rem;
    }

    /* Stats bar */
    .stats {
      background: white;
      border-radius: 10px;
      padding: 0.9rem 1.5rem;
      margin-bottom: 1.2rem;
      display: flex;
      gap: 0;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .stat {
      flex: 1;
      text-align: center;
      padding: 0.3rem 0;
    }
    .stat + .stat { border-inline-start: 1px solid #eee; }
    .stat .num { font-size: 1.7rem; font-weight: 700; line-height: 1; }
    .stat .lbl { font-size: 0.75rem; color: #888; margin-top: 0.2rem; }
    .stat.s-silent .num { color: #999; }
    .stat.s-beep1 .num  { color: #1565c0; }
    .stat.s-beep2 .num  { color: #bf360c; }

    /* Category accordion */
    .cat {
      background: white;
      border-radius: 10px;
      margin-bottom: 0.8rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      overflow: hidden;
    }

    .cat-head {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.85rem 1.1rem;
      cursor: pointer;
      user-select: none;
      transition: background 0.12s;
    }
    .cat-head:hover { background: #f9f9f9; }
    .cat.open .cat-head { border-bottom: 1px solid #f0f0f0; }

    .chevron {
      font-size: 0.65rem;
      color: #bbb;
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .cat.open .chevron { transform: rotate(180deg); }

    .cat-title { font-weight: 600; font-size: 0.92rem; flex: 1; }

    .set-all {
      display: flex;
      gap: 0.3rem;
      flex-shrink: 0;
    }
    .set-all button {
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      border: 1px solid #ddd;
      border-radius: 5px;
      background: white;
      cursor: pointer;
      color: #666;
      transition: background 0.12s;
      line-height: 1.4;
    }
    .set-all button:hover { background: #f0f0f0; }

    .cat-body { display: none; }
    .cat.open .cat-body { display: block; }

    /* Event row */
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.55rem 1.1rem;
      border-bottom: 1px solid #f7f7f7;
    }
    .row:last-child { border-bottom: none; }

    .ev-info { flex: 1; min-width: 0; }
    .ev-desc { font-size: 0.88rem; }
    .ev-file { font-size: 0.7rem; color: #bbb; font-family: 'Consolas', monospace; margin-top: 1px; }

    /* Segmented control */
    .seg {
      display: inline-flex;
      border: 1px solid #ddd;
      border-radius: 7px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .seg input[type=radio] { display: none; }
    .seg label {
      padding: 0.3rem 0.65rem;
      font-size: 0.8rem;
      cursor: pointer;
      color: #aaa;
      border-inline-start: 1px solid #ddd;
      transition: background 0.12s, color 0.12s;
      white-space: nowrap;
      line-height: 1.5;
    }
    .seg label:first-of-type { border-inline-start: none; }

    .seg input[value=silent]:checked + label {
      background: #eeeeee;
      color: #555;
      font-weight: 600;
    }
    .seg input[value=beep1]:checked + label {
      background: #1565c0;
      color: white;
      font-weight: 600;
    }
    .seg input[value=beep2]:checked + label {
      background: #bf360c;
      color: white;
      font-weight: 600;
    }

    /* Progress overlay */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .overlay.show { display: flex; }
    .progress-box {
      background: white;
      border-radius: 12px;
      padding: 2rem 2.5rem;
      text-align: center;
      min-width: 260px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    }
    .progress-box h3 { font-size: 1rem; margin-bottom: 1rem; }
    .bar-wrap {
      background: #eee;
      border-radius: 99px;
      height: 7px;
      overflow: hidden;
      margin-bottom: 0.6rem;
    }
    .bar-fill {
      height: 100%;
      background: #05c3dd;
      border-radius: 99px;
      width: 0;
      transition: width 0.08s;
    }
    .progress-sub { font-size: 0.78rem; color: #999; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>WazeBeepOnly</h1>
    <div class="sub">הגדר beep לכל event של Waze</div>
  </div>
  <div class="header-actions">
    <button class="btn-preview" onclick="previewSounds()">▶ תקשיב לצלילים</button>
    <button class="btn-download" id="dlBtn" onclick="generateZip()">הורד Voice Pack ↓</button>
  </div>
</header>

<div class="main">
  <div class="stats">
    <div class="stat s-silent">
      <div class="num" id="cntSilent">0</div>
      <div class="lbl">🔇 שקט</div>
    </div>
    <div class="stat s-beep1">
      <div class="num" id="cntBeep1">0</div>
      <div class="lbl">🔔 beep</div>
    </div>
    <div class="stat s-beep2">
      <div class="num" id="cntBeep2">0</div>
      <div class="lbl">🔔🔔 beep×2</div>
    </div>
  </div>

  <div id="cats"></div>
</div>

<div class="overlay" id="overlay">
  <div class="progress-box">
    <h3 id="progLabel">מייצר קבצים...</h3>
    <div class="bar-wrap"><div class="bar-fill" id="progBar"></div></div>
    <div class="progress-sub" id="progSub"></div>
  </div>
</div>

<script>
const CATS = [
  {
    name: "ניווט - פניות",
    events: [
      { f: "TurnLeft",    d: "פנה שמאלה",                def: "beep1" },
      { f: "TurnRight",   d: "פנה ימינה",                def: "beep1" },
      { f: "KeepLeft",    d: "הישאר בנתיב שמאל",         def: "beep1" },
      { f: "KeepRight",   d: "הישאר בנתיב ימין",         def: "beep1" },
      { f: "Straight",    d: "המשך ישר",                  def: "beep1" },
      { f: "ExitLeft",    d: "צא משמאל (כביש מהיר)",     def: "beep1" },
      { f: "ExitRight",   d: "צא מימין (כביש מהיר)",     def: "beep1" },
      { f: "Exit",        d: "צא (כללי)",                 def: "beep1" },
      { f: "uturn",       d: "פנייה פרסה",                def: "beep1" },
      { f: "Roundabout",  d: "כנס לכיכר",                 def: "beep1" },
    ]
  },
  {
    name: "מספרי יציאה (כיכר וכד׳)",
    events: [
      { f: "First",   d: "ראשונה",                       def: "silent" },
      { f: "Second",  d: "שנייה",                        def: "silent" },
      { f: "Third",   d: "שלישית",                       def: "silent" },
      { f: "Fourth",  d: "רביעית",                       def: "silent" },
      { f: "Fifth",   d: "חמישית",                       def: "silent" },
      { f: "Sixth",   d: "שישית",                        def: "silent" },
      { f: "Seventh", d: "שביעית",                       def: "silent" },
      { f: "AndThen", d: "ואז... (מחבר שתי הנחיות)",     def: "silent" },
    ]
  },
  {
    name: "מרחקים (לפני פנייה)",
    events: [
      { f: "200",        d: "עוד 200 רגל",    def: "silent" },
      { f: "400",        d: "עוד 400 רגל",    def: "silent" },
      { f: "800",        d: "עוד 800 רגל",    def: "silent" },
      { f: "1500",       d: "עוד מייל",       def: "silent" },
      { f: "200meters",  d: "עוד 200 מטר",    def: "silent" },
      { f: "400meters",  d: "עוד 400 מטר",    def: "silent" },
      { f: "800meters",  d: "עוד 800 מטר",    def: "silent" },
      { f: "1000meters", d: "עוד קילומטר",    def: "silent" },
      { f: "1500meters", d: "עוד 1.5 ק\"מ",  def: "silent" },
      { f: "ft",         d: "המילה 'רגל'",    def: "silent" },
      { f: "m",          d: "המילה 'מטר'",    def: "silent" },
      { f: "within",     d: "המילה 'תוך'",    def: "silent" },
    ]
  },
  {
    name: "התחלה וסיום נסיעה",
    events: [
      { f: "StartDrive1", d: "ברכת פתיחה 1", def: "silent" },
      { f: "StartDrive2", d: "ברכת פתיחה 2", def: "silent" },
      { f: "StartDrive3", d: "ברכת פתיחה 3", def: "silent" },
      { f: "StartDrive4", d: "ברכת פתיחה 4", def: "silent" },
      { f: "StartDrive5", d: "ברכת פתיחה 5", def: "silent" },
      { f: "StartDrive6", d: "ברכת פתיחה 6", def: "silent" },
      { f: "StartDrive7", d: "ברכת פתיחה 7", def: "silent" },
      { f: "StartDrive8", d: "ברכת פתיחה 8", def: "silent" },
      { f: "StartDrive9", d: "ברכת פתיחה 9", def: "silent" },
      { f: "Arrive",      d: "הגעת ליעד!",   def: "beep2" },
    ]
  },
  {
    name: "התרעות",
    events: [
      { f: "ApproachAccident",    d: "תאונה קדימה",       def: "beep2" },
      { f: "ApproachHazard",      d: "מפגע בדרך",          def: "beep2" },
      { f: "ApproachRedLightCam", d: "מצלמת רמזור",        def: "beep2" },
      { f: "ApproachSpeedCam",    d: "מצלמת מהירות",       def: "beep2" },
      { f: "ApproachTraffic",     d: "פקק קדימה",          def: "beep2" },
      { f: "Police",              d: "משטרה בדרך",         def: "beep2" },
    ]
  },
  {
    name: "צלילי ממשק",
    events: [
      { f: "click",          d: "קליק כפתור",             def: "silent" },
      { f: "click_long",     d: "לחיצה ארוכה",            def: "silent" },
      { f: "ping",           d: "התראת הודעה",             def: "beep1" },
      { f: "ping2",          d: "התראת הודעה (וריאציה)",   def: "beep1" },
      { f: "TickerPoints",   d: "קיבלת נקודות",           def: "silent" },
      { f: "message_ticker", d: "הודעה בצ׳אט",            def: "silent" },
      { f: "alert_1",        d: "התרעה כללית",             def: "beep1" },
      { f: "bonus",          d: "פרס / הישג",             def: "silent" },
      { f: "reminder",       d: "תזכורת",                 def: "beep1" },
      { f: "rec_start",      d: "התחלת הקלטה",            def: "silent" },
      { f: "rec_end",        d: "סיום הקלטה",             def: "silent" },
    ]
  },
];

// ── State ──────────────────────────────────────────────────────────
const state = {};
CATS.forEach(c => c.events.forEach(e => { state[e.f] = e.def; }));

// ── Audio (WAV) ────────────────────────────────────────────────────
const SR = 8000;

function makeWAV(samples) {
  const buf = new ArrayBuffer(44 + samples.length * 2);
  const v = new DataView(buf);
  const ws = s => [...s].forEach((c,i) => v.setUint8(offset+i, c.charCodeAt(0)));
  let offset = 0;
  const w = (fn, val, le) => { fn.call(v, offset, val, le); offset += fn === v.setUint8 ? 1 : fn === v.setUint16 ? 2 : 4; };

  // RIFF header
  v.setUint8(0,  0x52); v.setUint8(1,  0x49); v.setUint8(2,  0x46); v.setUint8(3,  0x46); // "RIFF"
  v.setUint32(4,  36 + samples.length * 2, true);
  v.setUint8(8,  0x57); v.setUint8(9,  0x41); v.setUint8(10, 0x56); v.setUint8(11, 0x45); // "WAVE"
  v.setUint8(12, 0x66); v.setUint8(13, 0x6D); v.setUint8(14, 0x74); v.setUint8(15, 0x20); // "fmt "
  v.setUint32(16, 16, true);           // subchunk size
  v.setUint16(20, 1, true);            // PCM
  v.setUint16(22, 1, true);            // mono
  v.setUint32(24, SR, true);           // sample rate
  v.setUint32(28, SR * 2, true);       // byte rate
  v.setUint16(32, 2, true);            // block align
  v.setUint16(34, 16, true);           // bits per sample
  v.setUint8(36, 0x64); v.setUint8(37, 0x61); v.setUint8(38, 0x74); v.setUint8(39, 0x61); // "data"
  v.setUint32(40, samples.length * 2, true);
  for (let i = 0; i < samples.length; i++) v.setInt16(44 + i * 2, samples[i], true);
  return new Uint8Array(buf);
}

function silence() {
  return makeWAV(new Int16Array(Math.floor(SR * 0.05)));
}

function beep(count) {
  const beepMs = 0.14, gapMs = 0.11;
  const bn = Math.floor(SR * beepMs), gn = Math.floor(SR * gapMs);
  const total = bn * count + gn * (count - 1);
  const s = new Int16Array(total);
  const freq = 880;
  const fade = Math.floor(SR * 0.012);
  for (let b = 0; b < count; b++) {
    const off = b * (bn + gn);
    for (let i = 0; i < bn; i++) {
      const t = i / SR;
      const env = Math.min(i / fade, 1) * Math.min((bn - i) / fade, 1);
      s[off + i] = Math.round(env * 13000 * Math.sin(2 * Math.PI * freq * t));
    }
  }
  return makeWAV(s);
}

const AUDIO = {
  silent: null,
  beep1:  null,
  beep2:  null,
};

function initAudio() {
  AUDIO.silent = silence();
  AUDIO.beep1  = beep(1);
  AUDIO.beep2  = beep(2);
}

// ── Preview ────────────────────────────────────────────────────────
let audioCtx = null;

function playWAV(wavBytes) {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  audioCtx.decodeAudioData(wavBytes.buffer.slice(0), buf => {
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    src.connect(audioCtx.destination);
    src.start();
  });
}

function previewSounds() {
  initAudio();
  playWAV(AUDIO.beep1);
  setTimeout(() => playWAV(AUDIO.beep2), 600);
}

// ── Render ─────────────────────────────────────────────────────────
function render() {
  const container = document.getElementById('cats');
  container.innerHTML = '';
  CATS.forEach((cat, ci) => {
    const div = document.createElement('div');
    div.className = 'cat open';
    div.innerHTML = `
      <div class="cat-head" onclick="toggleCat(this)">
        <span class="chevron">▼</span>
        <span class="cat-title">${cat.name}</span>
        <div class="set-all" onclick="event.stopPropagation()">
          <button onclick="setAll(${ci},'silent')">🔇 הכל</button>
          <button onclick="setAll(${ci},'beep1')">🔔 הכל</button>
          <button onclick="setAll(${ci},'beep2')">🔔🔔 הכל</button>
        </div>
      </div>
      <div class="cat-body">
        ${cat.events.map(e => renderRow(e)).join('')}
      </div>`;
    container.appendChild(div);
  });
  updateStats();
}

function renderRow(e) {
  const n = `r_${e.f}`;
  const v = state[e.f];
  return `
    <div class="row">
      <div class="ev-info">
        <div class="ev-desc">${e.d}</div>
        <div class="ev-file">${e.f}.mp3</div>
      </div>
      <div class="seg">
        <input type="radio" name="${n}" id="${n}_s" value="silent" ${v==='silent'?'checked':''} onchange="onChange('${e.f}','silent')">
        <label for="${n}_s">🔇 שקט</label>
        <input type="radio" name="${n}" id="${n}_1" value="beep1"  ${v==='beep1'?'checked':''}  onchange="onChange('${e.f}','beep1')">
        <label for="${n}_1">🔔</label>
        <input type="radio" name="${n}" id="${n}_2" value="beep2"  ${v==='beep2'?'checked':''}  onchange="onChange('${e.f}','beep2')">
        <label for="${n}_2">🔔🔔</label>
      </div>
    </div>`;
}

function toggleCat(head) { head.parentElement.classList.toggle('open'); }

function setAll(ci, val) {
  CATS[ci].events.forEach(e => { state[e.f] = val; });
  render();
}

function onChange(file, val) {
  state[file] = val;
  updateStats();
}

function updateStats() {
  let s = 0, b1 = 0, b2 = 0;
  Object.values(state).forEach(v => { if(v==='silent') s++; else if(v==='beep1') b1++; else b2++; });
  document.getElementById('cntSilent').textContent = s;
  document.getElementById('cntBeep1').textContent  = b1;
  document.getElementById('cntBeep2').textContent  = b2;
}

// ── Generate ZIP ───────────────────────────────────────────────────
async function generateZip() {
  const btn     = document.getElementById('dlBtn');
  const overlay = document.getElementById('overlay');
  const bar     = document.getElementById('progBar');
  const sub     = document.getElementById('progSub');
  const lbl     = document.getElementById('progLabel');

  btn.disabled = true;
  overlay.classList.add('show');
  lbl.textContent = 'מייצר קבצי אודיו...';
  bar.style.width = '0';

  await tick();
  initAudio();

  const zip    = new JSZip();
  const folder = zip.folder('beep_only');

  folder.file('INSTALL.txt',
`WazeBeepOnly Voice Pack
========================
התקנה:
1. העתק את תיקיית "beep_only" אל:
   /storage/emulated/0/waze/sound/

2. פתח Waze ← הגדרות ← קול ← קול ניווט
3. בחר "beep_only"

נוצר: ${new Date().toLocaleDateString('he-IL')}
`);

  const allEvs = CATS.flatMap(c => c.events);
  for (let i = 0; i < allEvs.length; i++) {
    const e = allEvs[i];
    folder.file(`${e.f}.mp3`, AUDIO[state[e.f]]);
    bar.style.width = ((i + 1) / allEvs.length * 90) + '%';
    sub.textContent  = `${i + 1} / ${allEvs.length} קבצים`;
    await tick();
  }

  lbl.textContent = 'אורז ZIP...';
  bar.style.width = '95%';
  await tick();

  const blob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 6 } });
  bar.style.width = '100%';
  await tick();

  const a = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = 'beep_only_voice_pack.zip';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);

  overlay.classList.remove('show');
  btn.disabled = false;
  bar.style.width = '0';
}

function tick() { return new Promise(r => setTimeout(r, 0)); }

// ── Init ───────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
