name: Upload Voice Pack to Waze

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r upload/requirements.txt

      - name: Generate and upload voice pack
        run: python upload/generate_and_upload.py upload/beep_config.json

      - name: Show install link
        run: |
          echo "## 📱 Waze Install Link" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Open this link on your phone:**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat waze_link.txt >> $GITHUB_STEP_SUMMARY

      - name: Commit waze_link.txt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add waze_link.txt
          git commit -m "chore: update waze install link [skip ci]"
          git push
